<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta tags configure browser behavior and device compatibility -->
    <meta charset="UTF-8">
    <!-- viewport enables responsive design on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good News Daily - Positive Stories</title>
    <style>
        /*
        ====================================================================
        CSS RESET - Remove browser defaults
        ====================================================================
        The * selector targets ALL elements. We reset spacing because browsers
        add default margins/padding. box-sizing: border-box makes padding count
        toward the width (standard behavior in modern CSS).
        */
        * {
            margin: 0;              /* Remove default margins */
            padding: 0;             /* Remove default padding */
            box-sizing: border-box; /* Include padding in width calculations */
        }

        /*
        BODY - Sets default appearance for entire page
        linear-gradient(135deg, color1, color2) creates diagonal color blend
        min-height: 100vh ensures body fills full viewport height
        */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);  /* Purple gradient */
            min-height: 100vh;  /* Fill full viewport height */
            padding: 20px;      /* Comfortable space around edges */
        }

        /*
        CONTAINER - Limits width and centers content on large screens
        max-width prevents layout from becoming too wide (improves readability)
        margin: 0 auto centers it horizontally
        */
        .container {
            max-width: 1200px;  /* Limit width for better reading */
            margin: 0 auto;     /* Center horizontally */
        }

        /*
        HEADER - Main title section with animation
        animation: slideDown makes the header smoothly slide down from above
        0.8s is duration, ease-out makes it slow down at the end
        */
        header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            animation: slideDown 0.8s ease-out;  /* Smooth entrance animation */
        }

        header h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            font-size: 18px;
            opacity: 0.95;
            font-weight: 300;
        }

        /*
        NEWS GRID - Container for stacking articles vertically
        display: flex with flex-direction: column arranges items top-to-bottom
        gap: 30px creates space between items (cleaner than using margins)
        */
        .news-grid {
            display: flex;           /* Use flexbox for layout */
            flex-direction: column;  /* Stack items vertically */
            gap: 30px;               /* Space between each article */
            margin-bottom: 50px;
        }

        /*
        NEWS CARD - Individual article (Daily Mail style with image on left)
        display: grid with grid-template-columns: 400px 1fr creates TWO columns:
          Column 1: 400px fixed width image)
          Column 2: 1fr (fraction unit - takes remaining space)
        animation: fadeInUp makes cards smoothly fade in while sliding up
        */
        .news-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);  /* Subtle shadow for depth */
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);  /* Smooth hover effects */
            animation: fadeInUp 0.6s ease-out backwards;  /* Entrance animation */
            cursor: pointer;
            display: grid;
            grid-template-columns: 400px 1fr;  /* Image (fixed) | Content (flexible) */
            border-bottom: 3px solid #667eea;  /* Accent border (Daily Mail style) */
        }

        .news-card:hover {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            background: #fafafa;
        }

        /*
        NEWS IMAGE - Left column of card (400px width, fixed)
        Uses flexbox (display: flex, align-items: center, justify-content: center)
        to center the emoji vertically and horizontally
        */
        .news-image {
            width: 100%;                           /* Fill 400px column */
            height: 300px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);  /* Gradient background */
            display: flex;              /* Use flexbox to center emoji */
            align-items: center;        /* Vertical center */
            justify-content: center;    /* Horizontal center */
            font-size: 120px;           /* Large emoji */
        }

        /*
        NEWS CONTENT - Right column of card (flexible width)
        Uses flex column to stack: category, title, description, meta (top to bottom)
        justify-content: space-between spreads them out with meta info at bottom
        */
        .news-content {
            padding: 32px;                    /* Internal spacing for readability */
            display: flex;                    /* Stack content vertically */
            flex-direction: column;
            justify-content: space-between;   /* Spread items with meta at bottom */
        }

        .news-category {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            width: fit-content;
        }

        .news-title {
            font-size: 28px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 16px;
            line-height: 1.3;
        }

        .news-description {
            font-size: 15px;
            color: #444;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .news-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #999;
            padding-top: 16px;
            border-top: 1px solid #eee;
        }

        .news-date {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .news-source {
            background: #f0f0f0;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 500;
        }

        /* "Read More" button for markdown articles */
        .read-more-btn {
            margin-top: 16px;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: background 0.3s ease;
        }

        .read-more-btn:hover {
            background: #764ba2;
        }

        /* Make markdown cards clickable */
        .news-card.markdown-article {
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .news-card.markdown-article:hover {
            transform: translateY(-4px);
        }

        /* 
        ====================================================================
        MODAL STYLES - Full article viewer
        ====================================================================
        Modal overlay appears on top of page to show full content
        */
        .modal {
            display: none;  /* Hidden by default */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);  /* Dark overlay */
            z-index: 1000;
            overflow-y: auto;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            max-width: 850px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 40px;
            position: relative;
            animation: slideUp 0.3s ease;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .modal-title-section h1 {
            font-size: 32px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .modal-category {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: #333;
        }

        .modal-meta {
            display: flex;
            gap: 20px;
            margin-top: 16px;
            font-size: 13px;
            color: #666;
        }

        .modal-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .modal-body {
            font-size: 15px;
            line-height: 1.8;
            color: #444;
        }

        .modal-body h2 {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            margin-top: 28px;
            margin-bottom: 16px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .modal-body h3 {
            font-size: 17px;
            font-weight: 700;
            color: #1a1a1a;
            margin-top: 20px;
            margin-bottom: 12px;
        }

        .modal-body p {
            margin-bottom: 16px;
        }

        .modal-body ul,
        .modal-body ol {
            margin-left: 24px;
            margin-bottom: 16px;
        }

        .modal-body li {
            margin-bottom: 8px;
        }

        .modal-body strong {
            font-weight: 700;
            color: #1a1a1a;
        }

        .modal-body em,
        .modal-body i {
            font-style: italic;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: white;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        /*
        ====================================================================
        CSS ANIMATIONS - Define smooth entrance and loading effects
        ====================================================================
        @keyframes defineanimatios referenced by animation property.
        Each keyframe defines progression from 'from' (start) to 'to' (end).
        Elements can use these animations repeatedly.
        */

        /* SPIN ANIMATION - rotating spinner for loading indicator */
        @keyframes spin {
            0% { transform: rotate(0deg); }      /* Start at 0 degrees */
            100% { transform: rotate(360deg); }  /* Full 360 degree rotation */
        }

        /* SLIDE DOWN ANIMATION - header slides down from above */
        @keyframes slideDown {
            from {
                opacity: 0;              /* Start invisible */
                transform: translateY(-30px);  /* Start 30px above */
            }
            to {
                opacity: 1;              /* End fully visible */
                transform: translateY(0);      /* End at normal position */
            }
        }

        /* FADE IN UP ANIMATION - articles fade in while sliding up */
        @keyframes fadeInUp {
            from {
                opacity: 0;              /* Start invisible */
                transform: translateY(30px);   /* Start 30px below */
            }
            to {
                opacity: 1;              /* End fully visible */
                transform: translateY(0);      /* End at normal position */
            }
        }

        .end-message {
            text-align: center;
            color: white;
            padding: 40px 20px;
            font-size: 18px;
            margin-top: 40px;
        }

        .emoji {
            font-size: 32px;
            margin-right: 10px;
        }

        /*
        ====================================================================
        RESPONSIVE DESIGN - Mobile adjustments for screens 768px and smaller
        ====================================================================
        @media (max-width: 768px) applies CSS ONLY on small screens.
        On mobile, the card layout changes from 2-column to 1-column
        (image stacks above content instead of beside it).
        */
        @media (max-width: 768px) {
            /* Smaller heading on mobile */
            header h1 {
                font-size: 36px;  /* Reduce from 48px */
            }

            /* Stack image ABOVE content on mobile (1 column instead of 2) */
            .news-card {
                grid-template-columns: 1fr;  /* Single column layout */
            }

            /* Reduce image height on small screens */
            .news-image {
                height: 250px;  /* Reduce from 300px */
            }

            /* Smaller title on mobile */
            .news-title {
                font-size: 22px;  /* Reduce from 28px */
            }

            /* Tighter spacing on mobile */
            .news-content {
                padding: 20px;  /* Reduce from 32px */
            }

            /* Reduce gap on mobile */
            header {
                margin-bottom: 30px;  /* Reduce from 50px */
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ Good News Daily</h1>
            <p>Scroll down for more positive stories that restore faith in humanity</p>
        </header>

        <div class="news-grid" id="newsGrid"></div>

        <div class="loading" id="loadingIndicator" style="display: none;">
            <div class="spinner"></div>
            <p>Loading more good news...</p>
        </div>

        <div class="end-message" id="endMessage" style="display: none;">
            <span class="emoji">🌟</span>
            <p>You've reached the end for now. Check back tomorrow for more good news!</p>
        </div>
    </div>

    <!-- Modal for displaying full article content -->
    <div class="modal" id="articleModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title-section">
                    <div class="modal-category" id="modalCategory"></div>
                    <h1 id="modalTitle"></h1>
                    <div class="modal-meta">
                        <div class="modal-meta-item">
                            <span>📅</span>
                            <span id="modalDate"></span>
                        </div>
                        <div class="modal-meta-item">
                            <span>📰</span>
                            <span id="modalSource"></span>
                        </div>
                    </div>
                </div>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        /*
        ================================================================================
                        JAVASCRIPT - INFINITE SCROLL SYSTEM
        ================================================================================
        
        WHAT THIS DOES:
        Creates an INFINITE scroll system that loads articles as user scrolls down.
        Technical highlight: generates unlimited content from only 10 base stories!
        
        HOW IT WORKS (High Level):
        1. Store 10 base stories as data
        2. Create a function that generates infinite variations (with different prefixes)
        3. Listen for scroll events
        4. When user scrolls near bottom, generate more stories
        5. Display them smoothly with animations
        
        LEARNING GOALS:
        ✓ Understand event-driven programming (scroll events)
        ✓ Learn DOM manipulation (creating and adding HTML elements)
        ✓ See how functions can generate content algorithmically
        ✓ Understand state management (tracking what's loaded)
        ✓ Learn about asynchronous patterns (setTimeout, callbacks)
        ✓ See closures and variable scope in action
        
        READING THIS CODE:
        - Start with "BASE STORIES" section to understand data structure
        - Look at getStory() function to understand infinite generation
        - Examine createNewsCard() to see DOM creation
        - Study window.addEventListener to understand scroll detection
        
        ================================================================================
        */
        
        /*
        ====================================================================
        BASE STORIES DATA
        ====================================================================
        These 10 stories are the SOURCE TRUTH - all content comes from these.
        Each story is an OBJECT with properties (emoji, category, title, etc).
        We don't load all 100+ stories - we generate variations instead!
        
        NOTE: Real markdown articles from /news_articles folder will be
        fetched from the backend server and displayed FIRST (at the top),
        sorted by date (newest first). These base stories act as fallback.
        
        PROPERTY EXPLANATION:
        - emoji: Visual representative emoji
        - category: Topic area (Environment, Health, etc)
        - title: Headline text
        - description: Full article preview text
        - source: Publication name
        - date: When published
        */
        /* Mock articles removed - displaying only markdown articles from .md files */
        const baseStories = [];  // Empty array - articles come from .md files only

        /*
        ====================================================================
        MARKDOWN ARTICLES LOADING
        ====================================================================
        Fetches markdown articles from GitHub API.
        These are the only articles displayed.
        Sorted by modification date: newest first.
        
        HOW IT WORKS:
        1. Fetch list of .md files from GitHub API
        2. Download raw content for each file
        3. Parse markdown content to extract metadata
        4. Convert to story format for display
        5. Automatically picks up new .md files added to news_articles folder
        
        If GitHub is not accessible, displays no articles.
        */
        
        // Array to hold markdown articles from GitHub
        let markdownArticles = [];
        
        // Fetch markdown articles from GitHub API
        async function loadMarkdownArticles() {
            try {
                /*
                LOAD MARKDOWN ARTICLES FROM GITHUB
                Fetch list of files from GitHub API, then get raw content for each .md file
                */
                const owner = 'itdevelopio';
                const repo = 'repo2';
                const branch = 'main';
                const folder = 'news_articles';
                
                /* Step 1: Get list of files in news_articles folder from GitHub API */
                const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${folder}`;
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    console.warn('Could not fetch markdown files from GitHub');
                    allStories = [];
                    return false;
                }
                
                const files = await response.json();
                
                /* Filter only .md files */
                const mdFiles = files.filter(file => file.name.endsWith('.md'));
                
                if (mdFiles.length === 0) {
                    console.warn('No markdown files found in GitHub');
                    allStories = [];
                    return false;
                }
                
                /* Step 2: Fetch and parse each markdown file */
                const articlePromises = mdFiles.map(async (file) => {
                    try {
                        const rawUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${folder}/${file.name}`;
                        const fileResponse = await fetch(rawUrl);
                        
                        if (!fileResponse.ok) {
                            console.warn(`Failed to fetch ${file.name}`);
                            return null;
                        }
                        
                        const content = await fileResponse.text();
                        
                        /* Parse the markdown content */
                        const parsed = parseMarkdownFile(content, file.name);
                        
                        return {
                            ...parsed,
                            fullContent: content,  /* Store full markdown for modal */
                            isMarkdown: true,
                            fileName: file.name,
                            lastModified: file.updated_at || new Date().toISOString()
                        };
                    } catch (error) {
                        console.error(`Error processing ${file.name}:`, error);
                        return null;
                    }
                });
                
                /* Wait for all articles to load */
                const articles = await Promise.all(articlePromises);
                const validArticles = articles.filter(a => a !== null);
                
                if (validArticles.length > 0) {
                    /* Sort by modification date (newest first) */
                    validArticles.sort((a, b) => new Date(b.lastModified) - new Date(a.lastModified));
                    
                    /* Convert to story format with emoji */
                    markdownArticles = validArticles.map(article => ({
                        emoji: getCategoryEmoji(article.category),
                        category: article.category,
                        title: article.title,
                        description: article.description,
                        source: article.source,
                        date: article.date,
                        fullContent: article.fullContent,
                        isMarkdown: true,
                        fileName: article.fileName
                    }));
                    
                    /* Only markdown articles, no base stories */
                    allStories = markdownArticles;
                    console.log(`✓ Loaded ${markdownArticles.length} markdown articles from GitHub`);
                    return true;
                } else {
                    console.warn('No valid articles found');
                    allStories = [];
                    return false;
                }
            } catch (error) {
                /*
                Graceful fallback - use no articles
                */
                console.warn('Could not load markdown articles from GitHub.');
                console.log('Error:', error.message);
                allStories = [];
                return false;
            }
        }
        
        /*
        PARSE MARKDOWN FILE
        Extracts title, description, category from markdown content
        */
        function parseMarkdownFile(content, fileName) {
            const lines = content.split('\n');
            let title = 'Untitled Article';
            let description = '';
            let category = 'News';
            
            /* Extract title from first # heading */
            for (let line of lines) {
                if (line.startsWith('# ')) {
                    title = line.replace('# ', '').trim();
                    break;
                }
            }
            
            /* Extract description from first paragraph after title */
            let foundTitle = false;
            let paraLines = [];
            for (let line of lines) {
                if (line.startsWith('# ')) {
                    foundTitle = true;
                    continue;
                }
                if (foundTitle && line.trim() !== '' && !line.startsWith('#')) {
                    paraLines.push(line.trim());
                    if (paraLines.join(' ').length > 200) break;
                }
            }
            description = paraLines.join(' ').substring(0, 300) + '...';
            
            /* Extract category from filename */
            const nameParts = fileName.replace('.md', '').split('_');
            if (nameParts.length > 0) {
                category = nameParts[0].charAt(0).toUpperCase() + nameParts[0].slice(1);
            }
            
            /* Get current date (since GitHub API doesn't always give us file modification time) */
            const date = new Date().toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric' 
            });
            
            return {
                title: title,
                description: description,
                category: category,
                source: fileName.replace('.md', '').replace(/_/g, ' '),
                date: date
            };
        }
        
        /*
        GET CATEGORY EMOJI
        Assigns relevant emoji based on article category
        */
        function getCategoryEmoji(category) {
            const emojiMap = {
                'Psychology': '🧠',
                'Health': '🏥',
                'Science': '🔬',
                'Environment': '🌍',
                'Technology': '💻',
                'Business': '💼',
                'Culture': '🎭',
                'Education': '🎓',
                'News': '📰',
                'Default': '✨'
            };
            
            /* Find matching emoji or use default */
            for (let key in emojiMap) {
                if (category.toLowerCase().includes(key.toLowerCase())) {
                    return emojiMap[key];
                }
            }
            return emojiMap['Default'];
        }
        
        /* Will be populated with markdown articles from .md files */
        let allStories = [];

        /*
        ====================================================================
        STORY VARIATION GENERATOR FUNCTION
        ====================================================================
        CONCEPT: We have base stories but want infinite unique articles!
        SOLUTION: Create variations by changing title prefix and date string.
        
        HOW IT WORKS:
        - Takes baseStory from array
        - Adds a different prefix ("Breaking News:", "New Report Shows", etc)
        - Changes the date using modulo operator (%) to cycle through dates
        - Returns a NEW object with modified title and date
        - Original baseStory is NOT changed (immutable pattern)
        
        TECHNICAL NOTES:
        - Uses spread operator (...baseStory) to copy all properties from base
        - Then OVERRIDES title and date with variations
        - Modulo operator (%) cycles through arrays: 0,1,2,...,max,0,1,2...
        
        PARAMETERS:
        - storyIndex: which story from baseStories to use
        - variationNumber: which variation (0, 1, 2, ... for different prefixes)
        */
        function generateStoryVariations(storyIndex, variationNumber) {
            /* Get base story, cycling through with modulo operator */
            const baseStory = allStories[storyIndex % allStories.length];
            
            /* If this is a markdown article, return it without modifications */
            if (baseStory.isMarkdown) {
                return baseStory;
            }
            
            /* Array of title prefixes - vary the wording */
            const variations = [
                "New Report Shows",
                "Breaking News:",
                "Latest Update:",
                "Exciting Development:",
                "Global Achievement:",
                "Major Milestone:",
                "Historic Moment:",
                "Pioneering Effort:",
                "Remarkable Progress:"
            ];
            
            /* Array of different date strings */
            const daysAgo = ["Today", "Yesterday", "2 days ago", "3 days ago", "1 week ago", "2 weeks ago"];
            
            /*
            Return a NEW object combining base story with variations.
            Spread operator (...) copies all properties from baseStory.
            Then we override title and date with variation selections.
            */
            return {
                ...baseStory,  /* Copy all properties: emoji, category, description, etc */
                /* Create new title: prefix + original title */
                title: variations[variationNumber % variations.length] + " " + baseStory.title,
                /* Select a different date string */
                date: daysAgo[variationNumber % daysAgo.length]
            };
        }

        /*
        ====================================================================
        GET STORY FUNCTION - Main interface for generating content
        ====================================================================
        CONCEPT: Convert a simple index (0, 1, 2, 3...) into a real story.
        This allows INFINITE scrolling by just asking for story #0, #1, #2, etc.
        
        THE MATH TRICK (This is the KEY to infinite content):
        - baseIndex = index % 10        → Cycles base stories: 0,1,2,...,9,0,1,2...
        - variationNumber = index / 10  → Cycles variations: 0,0,...,1,1,...
        
        EXAMPLES:
        - getStory(0) → uses baseStory[0], no prefix variation
        - getStory(5) → uses baseStory[5]
        - getStory(10) → uses baseStory[0] AGAIN, but different prefix!
        - getStory(11) → uses baseStory[1], different prefix
        - getStory(100) → uses baseStory[0], prefix cycles through again
        
        This mathematical approach generates unlimited unique content!
        */
        function getStory(index) {
            /* Which of the available stories to use (cycling through all) */
            const baseIndex = index % allStories.length;
            /* How many times through the stories (determines variation) */
            const variationNumber = Math.floor(index / allStories.length);
            // Generate and return the modified story
            return generateStoryVariations(baseIndex, variationNumber);
        }

        /*
        ====================================================================
        STATE VARIABLES - Track the infinite scroll system
        ====================================================================
        These variables PERSIST between function calls and remember state.
        */

        
        /* Dynamic array that GROWS as user scrolls - stores all displayed articles */
        let goodNewsData = [];
        
        /* Track how many articles have been processed so far */
        let currentIndex = 0;
        /* How many articles to load each time user scrolls to bottom */
        const itemsPerLoad = 6;
        /* Flag to prevent multiple simultaneous loads (prevents duplicates) */
        let isLoading = false;

        /*
        ====================================================================
        DOM ELEMENT CACHING
        ====================================================================
        Store references to HTML elements in variables.
        document.getElementById() searches the entire page - SLOW operation.
        Storing references in variables is much faster than repeated searches!
        */
        const newsGrid = document.getElementById('newsGrid');          /* Container for articles */
        const loadingIndicator = document.getElementById('loadingIndicator');  /* "Loading..." message */
        const endMessage = document.getElementById('endMessage');      /* "End" message (not used) */

        /*
        ====================================================================
        CREATE NEWS CARD FUNCTION
        ====================================================================
        Converts a story OBJECT into an HTML ELEMENT ready to display.
        This is DOM MANIPULATION - creating, configuring, returning elements.
        
        WHAT IT DOES:
        1. Creates a new <div> element
        2. Adds CSS class for styling
        3. Sets animation delay for staggered entrance
        4. Fills with HTML content using template literal
        5. Returns the element (ready to add to page)
        
        PARAMETERS:
        - newsItem: object with emoji, category, title, description, source, date
        - delay: animation delay index (0,1,2... for staggered effect)
        
        RETURNS:
        - HTML element ready to DOM.appendChild() into the page
        */
        function createNewsCard(newsItem, delay) {
            /* Create a new empty HTML div */
            const card = document.createElement('div');
            /* Add CSS class to apply styles from stylesheet */
            card.className = 'news-card';
            /*
            Set staggered animation delay
            delay=0 → 0s, delay=1 → 0.1s, delay=2 → 0.2s, etc
            Cards appear one after another smoothly
            */
            card.style.animationDelay = `${delay * 0.1}s`;
            /*
            Set the HTML content using JavaScript template literal (backticks)
            Template literals allow ${variable} syntax to insert values
            This creates: emoji | category, title, description, meta info
            For markdown articles, add a "Read More" button
            */
            const readMoreButton = newsItem.isMarkdown ? `<button class="read-more-btn">Read Full Article →</button>` : '';
            
            card.innerHTML = `
                <div class="news-image">${newsItem.emoji}</div>
                <div class="news-content">
                    <div class="news-category">${newsItem.category}</div>
                    <h3 class="news-title">${newsItem.title}</h3>
                    <p class="news-description">${newsItem.description}</p>
                    <div class="news-meta">
                        <span class="news-date">📅 ${newsItem.date}</span>
                        <span class="news-source">${newsItem.source}</span>
                    </div>
                    ${readMoreButton}
                </div>
            `;
            
            /* Add click event for markdown articles to open full content modal */
            if (newsItem.isMarkdown) {
                card.classList.add('markdown-article');
                card.addEventListener('click', (e) => {
                    /* Only trigger if clicking on the button or card itself, not links */
                    if (e.target.tagName !== 'A') {
                        openArticleModal(newsItem);
                    }
                });
            }
            
            /* Return the fully constructed HTML element */
            return card;
        }

        /*
        ====================================================================
        MODAL FUNCTIONS - Display full article content
        ====================================================================
        openArticleModal(newsItem) - Opens modal and populates with article content
        closeArticleModal() - Closes the modal
        */

        function openArticleModal(newsItem) {
            /* Get the modal element and content areas */
            const modal = document.getElementById('articleModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalCategory = document.getElementById('modalCategory');
            const modalDate = document.getElementById('modalDate');
            const modalSource = document.getElementById('modalSource');
            const modalBody = document.getElementById('modalBody');

            /* Populate modal with article data */
            modalTitle.textContent = newsItem.title;
            modalCategory.textContent = newsItem.category;
            modalDate.textContent = newsItem.date;
            modalSource.textContent = newsItem.source;
            
            /* Convert markdown content to HTML */
            /* Simple markdown conversion: 
               - ## headers become <h2>
               - > quotes become blockquote
               - ** bold ** becomes <strong>
               - \n\n becomes paragraphs
            */
            let htmlContent = newsItem.fullContent || newsItem.description;
            
            /* Replace markdown headers */
            htmlContent = htmlContent.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
            htmlContent = htmlContent.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
            htmlContent = htmlContent.replace(/^# (.*?)$/gm, '<h1>$1</h1>');
            
            /* Replace bold text */
            htmlContent = htmlContent.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            /* Replace italic text */
            htmlContent = htmlContent.replace(/\*(.*?)\*/g, '<em>$1</em>');
            
            /* Replace line breaks with paragraphs */
            const paragraphs = htmlContent.split('\n\n').filter(p => p.trim());
            htmlContent = paragraphs.map(p => `<p>${p.trim()}</p>`).join('');
            
            /* Set the HTML content in modal body */
            modalBody.innerHTML = htmlContent;
            
            /* Show the modal */
            modal.classList.add('active');
            
            /* Prevent body scroll when modal is open */
            document.body.style.overflow = 'hidden';
        }

        function closeArticleModal() {
            /* Get the modal element */
            const modal = document.getElementById('articleModal');
            
            /* Hide the modal */
            modal.classList.remove('active');
            
            /* Allow body scroll again */
            document.body.style.overflow = 'auto';
        }

        /*
        ====================================================================
        LOAD MORE NEWS FUNCTION - Heart of infinite scroll
        ====================================================================
        This function GENERATES new stories and DISPLAYS them on the page.
        Called when user scrolls near the bottom.
        
        PROCESS:
        1. Guard against duplicate loads
        2. Show loading indicator
        3. Delay 800ms (simulates network)
        4. No more articles to load (only markdown articles)
        5. Create HTML cards from stories
        6. Add cards to page
        7. Hide loading indicator
        8. Reset flag
        */
        function loadMoreNews() {
            /* Guard clause: exit immediately if already loading (prevent duplicates) */
            if (isLoading) return;

            /* Set flag to prevent other calls during load */
            isLoading = true;
            /* Show the spinner and "Loading..." message */
            loadingIndicator.style.display = 'block';

            /*
            setTimeout delays code execution for visual polish
            Since we only have markdown articles (no infinite generation),
            we just hide the loading indicator
            */
            setTimeout(() => {
                /* 
                With only markdown articles, there are no more articles to load
                Just hide the loading indicator
                */
                isLoading = false;
                loadingIndicator.style.display = 'none';
                
                /* Optional: Show a message that there are no more articles */
                if (goodNewsData.length > 0 && newsGrid.children.length === goodNewsData.length) {
                    const endMessage = document.createElement('div');
                    endMessage.style.textAlign = 'center';
                    endMessage.style.padding = '40px 20px';
                    endMessage.style.color = '#999';
                    endMessage.style.fontSize = '16px';
                    endMessage.innerHTML = '✨ You\'ve reached the end of all articles ✨';
                    newsGrid.appendChild(endMessage);
                }
            }, 800);
        }
                });

                /* Update counter for next batch */
                currentIndex += itemsPerLoad;

                /* Hide the loading indicator */
                isLoading = false;
                loadingIndicator.style.display = 'none';
            }, 800);
        }

        /*
        ====================================================================
        SCROLL EVENT LISTENER - Detects when user scrolls
        ====================================================================
        addEventListener attaches a function to an event.
        When 'scroll' event fires, the arrow function runs automatically.
        
        SCROLL MATH (Understanding the detection):
        window.innerHeight   = visible viewport height (e.g., 800px)
        window.scrollY       = pixels scrolled down from top
        scrollPosition       = bottom of visible area (height + scrollY)
        documentElement.scrollHeight = total page height (entire content)
        
        TRIGGER CONDITION:
        When scrollPosition >= pageHeight - 500
        User is within 500px of the bottom
        
        EXAMPLE:
        - Page is 5000px tall
        - Can see 800px at a time
        - When scroll position reaches 4500px+, trigger load
        */
        window.addEventListener('scroll', () => {
            /* Calculate where the bottom of visible area is */
            const scrollPosition = window.innerHeight + window.scrollY;
            /* Get total height of all content */
            const pageHeight = document.documentElement.scrollHeight;

            /*
            TRIGGER LOAD if:
            1. User scrolled past (pageHeight - 500px) threshold, AND
            2. Not already loading something
            */
            if (scrollPosition >= pageHeight - 500 && !isLoading) {
                /* Call function to load more articles */
                loadMoreNews();
            }
        });

        /*
        ====================================================================
        MODAL EVENT LISTENERS - Setup close handlers
        ====================================================================
        */
        
        /* Get modal elements */
        const modal = document.getElementById('articleModal');
        const modalClose = document.getElementById('modalClose');
        
        /* Close modal when close button is clicked */
        if (modalClose) {
            modalClose.addEventListener('click', closeArticleModal);
        }
        
        /* Close modal when clicking outside the content (on the overlay) */
        if (modal) {
            modal.addEventListener('click', (e) => {
                /* Only close if clicking directly on background, not on content */
                if (e.target === modal) {
                    closeArticleModal();
                }
            });
        }
        
        /* Close modal when ESC key is pressed */
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeArticleModal();
            }
        });

        /*
        ====================================================================
        INITIAL PAGE LOAD - Runs when page first loads
        ====================================================================
        These lines execute automatically when browser loads the page.
        They populate the page with initial articles from markdown files.
        */
        
        /*
        LOAD MARKDOWN ARTICLES FROM GITHUB
        Fetch articles from GitHub before displaying
        This loads all markdown articles from the news_articles folder
        */
        loadMarkdownArticles().then(() => {
            /* Initialize goodNewsData with markdown articles */
            goodNewsData = [];  /* Reset data array */
            
            /* Add all markdown articles to the display */
            if (markdownArticles && markdownArticles.length > 0) {
                goodNewsData = [...markdownArticles];
                console.log(`✓ Displaying ${markdownArticles.length} markdown articles`);
                
                /* Display all articles on page load */
                goodNewsData.forEach((newsItem, index) => {
                    const card = createNewsCard(newsItem, index);
                    newsGrid.appendChild(card);
                });
            } else {
                /* No articles to display */
                const noArticlesMsg = document.createElement('div');
                noArticlesMsg.style.textAlign = 'center';
                noArticlesMsg.style.padding = '40px 20px';
                noArticlesMsg.style.color = '#999';
                noArticlesMsg.innerHTML = '📭 No articles found';
                newsGrid.appendChild(noArticlesMsg);
            }
        });
    </script>
</body>
