<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good News Daily - Positive Stories</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            animation: slideDown 0.8s ease-out;
        }

        header h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            font-size: 18px;
            opacity: 0.95;
            font-weight: 300;
        }

        .news-grid {
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-bottom: 50px;
        }

        .news-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            animation: fadeInUp 0.6s ease-out backwards;
            cursor: pointer;
            display: grid;
            grid-template-columns: 400px 1fr;
            border-bottom: 3px solid #667eea;
        }

        .news-card:hover {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            background: #fafafa;
        }

        .news-image {
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 120px;
        }

        .news-content {
            padding: 32px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .news-category {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            width: fit-content;
        }

        .news-title {
            font-size: 28px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 16px;
            line-height: 1.3;
        }

        .news-description {
            font-size: 15px;
            color: #444;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .news-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #999;
            padding-top: 16px;
            border-top: 1px solid #eee;
        }

        .news-date {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .news-source {
            background: #f0f0f0;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 500;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: white;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .end-message {
            text-align: center;
            color: white;
            padding: 40px 20px;
            font-size: 18px;
            margin-top: 40px;
        }

        .emoji {
            font-size: 32px;
            margin-right: 10px;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 36px;
            }

            .news-card {
                grid-template-columns: 1fr;
            }

            .news-image {
                height: 250px;
            }

            .news-title {
                font-size: 22px;
            }

            .news-content {
                padding: 20px;
            }

            header {
                margin-bottom: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ Good News Daily</h1>
            <p>Scroll down for more positive stories that restore faith in humanity</p>
        </header>

        <div class="news-grid" id="newsGrid"></div>

        <div class="loading" id="loadingIndicator" style="display: none;">
            <div class="spinner"></div>
            <p>Loading more good news...</p>
        </div>

        <div class="end-message" id="endMessage" style="display: none;">
            <span class="emoji">🌟</span>
            <p>You've reached the end for now. Check back tomorrow for more good news!</p>
        </div>
    </div>

    <script>
        // ========================================================================
        // GOOD NEWS PAGE - INFINITE SCROLL IMPLEMENTATION
        // ========================================================================
        
        // Base stories - real content
        const baseStories = [
            {
                emoji: "🌍",
                category: "Environment",
                title: "Global Tree Planting Initiative Surpasses 15 Billion Trees",
                description: "In a landmark achievement for environmental restoration, a coordinated worldwide effort to combat climate change and deforestation has successfully planted over 15 billion trees across all continents. The initiative, which began seven years ago with ambitious goals, has created millions of sustainable jobs in rural communities, improved air quality measurably in major cities, and restored ecosystems in previously degraded regions. Scientists report that the carbon sequestration potential of these planted forests could offset billions of tons of carbon dioxide over the coming decades. Indigenous communities have played a crucial role in the project, combining traditional ecological knowledge with modern conservation techniques to ensure the long-term survival and health of the restored forests.",
                source: "GreenEarth News",
                date: "Today"
            },
            {
                emoji: "🏥",
                category: "Health",
                title: "New Cancer Treatment Shows 90% Remission Rate in Breakthrough Study",
                description: "Researchers from leading medical institutions worldwide have unveiled a revolutionary immunotherapy treatment that achieves a 90% remission rate in previously incurable cancer cases. The groundbreaking therapy harnesses the patient's own immune system to target and eliminate cancer cells with unprecedented precision. Clinical trials involving thousands of patients across multiple continents have demonstrated dramatic improvements in survival rates and quality of life. The treatment works by training immune cells to recognize and destroy cancerous growths while leaving healthy tissue unharmed. With affordability improvements already underway, this discovery offers genuine hope to the millions of cancer patients worldwide who had previously faced limited treatment options. Medical experts are calling it one of the most significant breakthroughs in oncology of the past two decades.",
                source: "Medical Today",
                date: "Yesterday"
            },
            {
                emoji: "🎓",
                category: "Education",
                title: "Free Online Education Reaches 500 Million Students Worldwide",
                description: "In a transformative moment for global education, major online learning platforms have successfully provided high-quality educational content to over 500 million students across developing nations. The initiative addresses the critical global challenge of educational inequality, ensuring that students in remote villages and poor urban neighborhoods now have access to the same learning resources as those in wealthy countries. Teachers in underserved regions report that their students are achieving significantly higher test scores and demonstrating greater confidence in their academic abilities. The program has introduced curriculum in over 150 languages, making quality education genuinely accessible to marginalized communities. Universities from developed nations have partnered to create locally-relevant content while maintaining world-class standards. Experts predict that within a generation, this educational democratization will produce skilled professionals from populations previously cut off from opportunity.",
                source: "Learning Hub",
                date: "2 days ago"
            },
            {
                emoji: "🚀",
                category: "Technology",
                title: "Clean Energy Now Provides 50% of Global Electricity Supply",
                description: "A historic milestone has been reached as renewable energy sources including solar, wind, and hydroelectric power now generate 50% of the world's electricity. This unprecedented achievement represents a fundamental shift in global energy production and marks a turning point in humanity's fight against climate change. Technological advancements in solar efficiency and battery storage have made clean energy not just environmentally necessary but economically competitive with fossil fuels. Developing nations are particularly benefiting from the declining costs of renewable technology, allowing them to build modern energy infrastructure without the stranded assets of outdated coal and oil dependence. Industry experts report that clean energy investments have created more jobs than the entire fossil fuel industry previously employed. The momentum continues to accelerate, with projections suggesting 70% renewable electricity by 2030.",
                source: "TechTimes",
                date: "3 days ago"
            },
            {
                emoji: "🤝",
                category: "Community",
                title: "Global Volunteer Movement Builds 1,000 Homes for Families in Need",
                description: "An inspiring international coalition of volunteers, corporations, and nonprofits has successfully constructed over 1,000 dignified homes for families experiencing homelessness. The massive undertaking coordinated efforts across dozens of countries, mobilizing over 100,000 volunteer work hours and demonstrating the power of collective action. Each home, built using sustainable materials and modern construction techniques, provides not just shelter but a foundation for transformed lives. Participating families report dramatic improvements in children's school attendance, adult employment prospects, and overall mental health since obtaining stable housing. The project has also revitalized struggling neighborhoods, creating community gardens, playgrounds, and gathering spaces alongside the homes. Organizations involved report that the increased stability allows families to address health issues, pursue education, and contribute more fully to their communities.",
                source: "Community Weekly",
                date: "4 days ago"
            },
            {
                emoji: "🐼",
                category: "Wildlife",
                title: "Endangered Species Population Doubles Following Five-Year Conservation Effort",
                description: "One of the most uplifting environmental success stories in recent memory unfolded this week as populations of several critically endangered species have doubled over the past five years. Coordinated international conservation efforts have created protected habitats, reduced poaching through indigenous ranger programs, and implemented DNA-based monitoring systems to track recovery. The achievement encompasses species from diverse ecosystems including giant pandas, African elephants, Indian tigers, and numerous bird and amphibian species. Scientists attribute the success to combining legal protections with economic incentives for local communities to preserve wildlife habitats. The recovery demonstrates that extinction is not inevitable when sufficient resources and political will are committed to conservation. Conservation organizations are expanding successful programs to protect hundreds of additional species currently facing extinction threats.",
                source: "Nature Today",
                date: "5 days ago"
            },
            {
                emoji: "💚",
                category: "Social Good",
                title: "Child Poverty Rates Decline by 40% in Global Achievement",
                description: "In perhaps the most significant victory for global social progress in decades, international development organizations report that child poverty rates have dropped by 40% globally over the past ten years. This extraordinary improvement reflects coordinated efforts in education access, healthcare provision, and economic opportunity creation across developing nations. Millions of children who previously worked in hazardous conditions or missed school due to poverty now attend classes regularly and have prospects for better futures. The improvement is particularly pronounced in sub-Saharan Africa and Southeast Asia, where targeted interventions have proven remarkably effective. Programs combining microfinance, education subsidies, and healthcare access have created sustainable pathways out of poverty. Child labor has declined dramatically, with millions of children now able to pursue education instead of working to support their families. Development experts attribute success to both increased international aid and improved governance in recipient nations.",
                source: "Good News Network",
                date: "6 days ago"
            },
            {
                emoji: "🔬",
                category: "Science",
                title: "Alzheimer's Vaccine Enters Critical Final Testing Phase with Stunning Results",
                description: "A groundbreaking vaccine targeting Alzheimer's disease has advanced into final human clinical trials after demonstrating remarkable effectiveness in preventing cognitive decline. The therapeutic vaccine works by training the immune system to target amyloid-beta proteins that accumulate in the brains of Alzheimer's patients. Preliminary trials show that people receiving the vaccine maintain cognitive function while untreated patients in comparison groups experienced measurable mental decline. If successful in final trials, the vaccine could prevent the development of Alzheimer's disease in millions of people worldwide, rather than simply treating symptoms after brain damage occurs. The discovery represents a fundamental shift from managing disease to preventing it entirely. With over 150 million people projected to suffer from Alzheimer's by 2050, this preventive approach could spare hundreds of millions from this devastating illness.",
                source: "Science Daily",
                date: "1 week ago"
            },
            {
                emoji: "🌱",
                category: "Agriculture",
                title: "Vertical Farming Revolution Ends Food Scarcity in Urban African Centers",
                description: "An agricultural innovation reshaping food security in Africa has emerged as vertical farming systems transform vacant urban spaces into productive food production centers. Modern hydroponic and aeroponic systems allow African cities to grow fresh vegetables, fruits, and grains year-round regardless of climate conditions, while using 95% less water than traditional agriculture. The technology has moved from experimental installations to commercial operations providing consistent supplies of affordable fresh produce to formerly food-insecure neighborhoods. Young entrepreneurs, particularly women, are establishing themselves as vertical farm operators, creating economic opportunities in economically disadvantaged communities. The localized production model dramatically reduces transportation costs and environmental impact compared to importing food across continents. Nutritional improvements in communities adopting vertical-farmed produce have been documented, with reduced malnutrition and improved health outcomes. The proven model is rapidly expanding to other continents.",
                source: "Agri-News",
                date: "1 week ago"
            },
            {
                emoji: "🎵",
                category: "Culture",
                title: "Young Artists from Around Globe Win International Recognition and Career Support",
                description: "A newly established global arts initiative has identified and provided substantial support to thousands of young artists from disadvantaged backgrounds, launching previously undiscovered talent onto the international stage. The program recognizes that artistic genius exists everywhere but only becomes visible when resources and platforms are provided to develop and showcase it. Young musicians, visual artists, dancers, and writers from rural regions, refugee camps, and low-income neighborhoods have been connected with mentors, performance opportunities, and financial support to pursue their crafts. International audiences are discovering remarkable artists whose perspectives and styles reflect unique cultural backgrounds and lived experiences. Record galleries have funded exhibitions by previously unknown artists who now command significant recognition and sales. The initiative demonstrates that talent is universally distributed while opportunity has been historically concentrated, and that addressing that disparity unleashes extraordinary human creativity.",
                source: "Arts Weekly",
                date: "8 days ago"
            }
        ];

        // Generate infinite variations on base stories
        function generateStoryVariations(storyIndex, variationNumber) {
            const baseStory = baseStories[storyIndex % baseStories.length];
            const variations = [
                "New Report Shows",
                "Breaking News:",
                "Latest Update:",
                "Exciting Development:",
                "Global Achievement:",
                "Major Milestone:",
                "Historic Moment:",
                "Pioneering Effort:",
                "Remarkable Progress:"
            ];
            
            const daysAgo = ["Today", "Yesterday", "2 days ago", "3 days ago", "1 week ago", "2 weeks ago"];
            
            return {
                ...baseStory,
                title: variations[variationNumber % variations.length] + " " + baseStory.title,
                date: daysAgo[variationNumber % daysAgo.length]
            };
        }

        // Generate story on demand
        function getStory(index) {
            const baseIndex = index % baseStories.length;
            const variationNumber = Math.floor(index / baseStories.length);
            return generateStoryVariations(baseIndex, variationNumber);
        }

        // Create persistent data array that grows as needed
        let goodNewsData = [];

        // ========================================================================
        // INFINITE SCROLL LOGIC
        // ========================================================================

        let currentIndex = 0;
        const itemsPerLoad = 6;
        let isLoading = false;

        const newsGrid = document.getElementById('newsGrid');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const endMessage = document.getElementById('endMessage');

        // Create a news card element
        function createNewsCard(newsItem, delay) {
            const card = document.createElement('div');
            card.className = 'news-card';
            card.style.animationDelay = `${delay * 0.1}s`;
            card.innerHTML = `
                <div class="news-image">${newsItem.emoji}</div>
                <div class="news-content">
                    <div class="news-category">${newsItem.category}</div>
                    <h3 class="news-title">${newsItem.title}</h3>
                    <p class="news-description">${newsItem.description}</p>
                    <div class="news-meta">
                        <span class="news-date">📅 ${newsItem.date}</span>
                        <span class="news-source">${newsItem.source}</span>
                    </div>
                </div>
            `;
            return card;
        }

        // Load more news items (generates on demand)
        function loadMoreNews() {
            if (isLoading) return;

            isLoading = true;
            loadingIndicator.style.display = 'block';

            // Simulate network delay (optional)
            setTimeout(() => {
                // Generate new stories on demand
                const startIndex = goodNewsData.length;
                for (let i = 0; i < itemsPerLoad; i++) {
                    goodNewsData.push(getStory(startIndex + i));
                }

                // Display the newly generated items
                goodNewsData.slice(startIndex, startIndex + itemsPerLoad).forEach((newsItem, index) => {
                    const card = createNewsCard(newsItem, index);
                    newsGrid.appendChild(card);
                });

                currentIndex += itemsPerLoad;

                isLoading = false;
                loadingIndicator.style.display = 'none';
            }, 800);
        }

        // Detect when user scrolls near the bottom
        window.addEventListener('scroll', () => {
            // Calculate scroll position
            const scrollPosition = window.innerHeight + window.scrollY;
            const pageHeight = document.documentElement.scrollHeight;

            // Load more when user is within 500px of the bottom (infinite scroll)
            if (scrollPosition >= pageHeight - 500 && !isLoading) {
                loadMoreNews();
            }
        });

        // Initial load - 6 articles to start
        const startingIndex = goodNewsData.length;
        for (let i = 0; i < 6; i++) {
            goodNewsData.push(getStory(i));
        }
        loadMoreNews();
    </script>
</body>
</html>
